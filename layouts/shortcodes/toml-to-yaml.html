<style>
.cvt-wrapper { width: 100%; font-family: inherit; }

.cvt-layout {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 1rem;
  align-items: stretch;
}

@media (max-width: 480px) {
  .cvt-layout { grid-template-columns: 1fr; }
  .cvt-middle { flex-direction: row !important; padding-top: 0 !important; }
}

.cvt-panel { display: flex; flex-direction: column; gap: 0.5rem; min-width: 0; }

.cvt-panel-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 0.5rem;
  min-height: 2rem;
}

.cvt-label {
  font-weight: 700;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--secondary);
}

.cvt-panel-btns { display: flex; gap: 0.4rem; flex-wrap: wrap; }

.cvt-btn {
  padding: 0.35rem 0.7rem;
  font-size: 0.8rem;
  background: var(--entry);
  color: var(--primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  line-height: 1.4;
  transition: background 0.15s;
  font-family: inherit;
}
.cvt-btn:hover { background: var(--border); }

.cvt-middle {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.6rem;
  padding-top: 2.5rem;
}

.cvt-btn-convert {
  padding: 0.6rem 1.2rem;
  font-size: 0.95rem;
  font-weight: 700;
  background: var(--primary);
  color: var(--theme);
  border: 1px solid var(--primary);
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: opacity 0.15s;
  font-family: inherit;
}
.cvt-btn-convert:hover { opacity: 0.82; }

.cvt-btn-swap {
  padding: 0.35rem 0.8rem;
  font-size: 0.82rem;
  background: var(--entry);
  color: var(--primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  font-family: inherit;
}
.cvt-btn-swap:hover { background: var(--border); }

.cvt-textarea {
  width: 100%;
  min-height: 340px;
  padding: 0.75rem;
  font-family: monospace;
  font-size: 0.82rem;
  line-height: 1.5;
  background: var(--entry);
  color: var(--primary);
  border: 1px solid var(--border);
  border-radius: 4px;
  resize: vertical;
  box-sizing: border-box;
  transition: outline 0.1s;
}
.cvt-textarea:focus { outline: 2px solid var(--primary); outline-offset: 1px; }
.cvt-textarea.drag-over {
  outline: 2px dashed var(--primary);
  outline-offset: 2px;
  border-color: var(--primary);
}

.cvt-error {
  display: none;
  padding: 0.5rem 0.75rem;
  font-family: monospace;
  font-size: 0.8rem;
  color: #c53030;
  background: rgba(197,48,48,0.08);
  border: 1px solid rgba(197,48,48,0.3);
  border-radius: 4px;
}
.cvt-error.visible { display: block; }

.cvt-file-input { display: none; }
</style>

<div class="cvt-wrapper">
  <div class="cvt-layout">

    <!-- Input panel -->
    <div class="cvt-panel">
      <div class="cvt-panel-header">
        <span class="cvt-label" id="cvt-input-label">TOML Input</span>
        <div class="cvt-panel-btns">
          <button class="cvt-btn" id="cvt-paste-btn">Paste from Clipboard</button>
          <label class="cvt-btn" for="cvt-file-input" style="cursor:pointer;display:inline-block">Upload File</label>
          <input type="file" id="cvt-file-input" class="cvt-file-input" accept=".toml,text/plain">
        </div>
      </div>
      <textarea id="cvt-input" class="cvt-textarea"
        placeholder="Paste TOML here, click Upload File, or drag and drop a .toml file onto this area..."></textarea>
      <div id="cvt-error" class="cvt-error"></div>
    </div>

    <!-- Middle controls -->
    <div class="cvt-middle">
      <button class="cvt-btn-convert" id="cvt-convert-btn">Convert &rarr;</button>
      <button class="cvt-btn-swap" id="cvt-swap-btn">&#8644; Swap</button>
    </div>

    <!-- Output panel -->
    <div class="cvt-panel">
      <div class="cvt-panel-header">
        <span class="cvt-label" id="cvt-output-label">YAML Output</span>
        <div class="cvt-panel-btns">
          <button class="cvt-btn" id="cvt-copy-btn">Copy to Clipboard</button>
        </div>
      </div>
      <textarea id="cvt-output" class="cvt-textarea" readonly
        placeholder="YAML output will appear here..."></textarea>
    </div>

  </div>
</div>

<script src="https://shortcdn.com/chrisshort/j-toml.min.js"></script>
<script src="https://shortcdn.com/chrisshort/js-yaml.min.js"></script>
<script>
(function () {
  var inputEl     = document.getElementById('cvt-input');
  var outputEl    = document.getElementById('cvt-output');
  var errorEl     = document.getElementById('cvt-error');
  var fileEl      = document.getElementById('cvt-file-input');
  var convertBtn  = document.getElementById('cvt-convert-btn');
  var swapBtn     = document.getElementById('cvt-swap-btn');
  var inputLabel  = document.getElementById('cvt-input-label');
  var outputLabel = document.getElementById('cvt-output-label');

  // direction: 'toml2yaml' | 'yaml2toml'
  var direction = 'toml2yaml';

  var cfg = {
    toml2yaml: {
      inputLabel:       'TOML Input',
      outputLabel:      'YAML Output',
      inputPlaceholder: 'Paste TOML here, click Upload File, or drag and drop a .toml file onto this area...',
      outputPlaceholder:'YAML output will appear here...',
      btnText:          'Convert \u2192',
      fileAccept:       '.toml,text/plain',
    },
    yaml2toml: {
      inputLabel:       'YAML Input',
      outputLabel:      'TOML Output',
      inputPlaceholder: 'Paste YAML here, click Upload File, or drag and drop a .yaml/.yml file onto this area...',
      outputPlaceholder:'TOML output will appear here...',
      btnText:          '\u2190 Convert',
      fileAccept:       '.yaml,.yml,text/plain',
    },
  };

  function applyDirection() {
    var c = cfg[direction];
    inputLabel.textContent   = c.inputLabel;
    outputLabel.textContent  = c.outputLabel;
    inputEl.placeholder      = c.inputPlaceholder;
    outputEl.placeholder     = c.outputPlaceholder;
    convertBtn.textContent   = c.btnText;
    fileEl.accept            = c.fileAccept;
  }

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('visible');
    outputEl.value = '';
  }

  function clearError() {
    errorEl.textContent = '';
    errorEl.classList.remove('visible');
  }

  function convertToml2Yaml(src) {
    var parsed = TOML.parse(src);
    // Flatten TOML-typed objects (dates, BigInts, etc.) via JSON round-trip
    var plain = JSON.parse(JSON.stringify(parsed, function (_, v) {
      return typeof v === 'bigint' ? Number(v) : v;
    }));
    return jsyaml.dump(plain, { lineWidth: -1 });
  }

  function convertYaml2Toml(src) {
    var parsed = jsyaml.load(src);
    if (parsed === null || parsed === undefined || typeof parsed !== 'object' || Array.isArray(parsed)) {
      throw new Error('YAML root must be a mapping (object), not a scalar or sequence.');
    }
    return serializeToml(parsed, '').trimRight() + '\n';
  }

  // ── TOML serializer ──────────────────────────────────────────────────────
  function serializeToml(obj, keyPath) {
    var scalars = '';
    var deferred = '';
    Object.keys(obj).forEach(function (key) {
      var val = obj[key];
      var escapedKey = tomlKey(key);
      var fullPath = keyPath ? keyPath + '.' + escapedKey : escapedKey;
      if (val === null || val === undefined) {
        scalars += escapedKey + ' = ""\n';
      } else if (typeof val === 'boolean' || typeof val === 'number') {
        scalars += escapedKey + ' = ' + val + '\n';
      } else if (typeof val === 'string') {
        scalars += escapedKey + ' = ' + tomlString(val) + '\n';
      } else if (val instanceof Date) {
        scalars += escapedKey + ' = ' + val.toISOString() + '\n';
      } else if (Array.isArray(val)) {
        if (val.length === 0) {
          scalars += escapedKey + ' = []\n';
        } else if (isScalarArray(val)) {
          scalars += escapedKey + ' = [' + val.map(tomlScalar).join(', ') + ']\n';
        } else {
          val.forEach(function (item) {
            deferred += '\n[[' + fullPath + ']]\n';
            deferred += serializeToml(item, fullPath);
          });
        }
      } else if (typeof val === 'object') {
        deferred += '\n[' + fullPath + ']\n';
        deferred += serializeToml(val, fullPath);
      }
    });
    return scalars + deferred;
  }

  function isScalarArray(arr) {
    return arr.every(function (v) {
      return v === null || v === undefined || typeof v !== 'object' || v instanceof Date;
    });
  }

  function tomlKey(key) {
    return /^[A-Za-z0-9_-]+$/.test(key) ? key : '"' + key.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"';
  }

  function tomlScalar(val) {
    if (val === null || val === undefined) return '""';
    if (typeof val === 'boolean') return String(val);
    if (typeof val === 'number') return String(val);
    if (typeof val === 'string') return tomlString(val);
    if (val instanceof Date) return val.toISOString();
    return '"' + String(val) + '"';
  }

  function tomlString(s) {
    // Multiline basic string for values containing newlines
    if (s.indexOf('\n') !== -1 || s.indexOf('\r') !== -1) {
      return '"""\n' + s.replace(/\\/g, '\\\\').replace(/"""/g, '\\"\\"\\"') + '\n"""';
    }
    return '"' + s.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/\t/g, '\\t') + '"';
  }
  // ─────────────────────────────────────────────────────────────────────────

  function convert() {
    clearError();
    var src = inputEl.value.trim();
    if (!src) { showError('Input is empty.'); return; }
    try {
      outputEl.value = direction === 'toml2yaml'
        ? convertToml2Yaml(src)
        : convertYaml2Toml(src);
    } catch (e) {
      showError(e.message || String(e));
    }
  }

  convertBtn.addEventListener('click', convert);

  swapBtn.addEventListener('click', function () {
    var prevInput  = inputEl.value;
    var prevOutput = outputEl.value;
    inputEl.value  = prevOutput;
    outputEl.value = prevInput;
    direction = direction === 'toml2yaml' ? 'yaml2toml' : 'toml2yaml';
    applyDirection();
    clearError();
  });

  // Paste from clipboard
  document.getElementById('cvt-paste-btn').addEventListener('click', function () {
    if (!navigator.clipboard) { showError('Clipboard API not available in this browser.'); return; }
    navigator.clipboard.readText().then(function (text) {
      inputEl.value = text;
      clearError();
    }).catch(function () {
      showError('Could not read clipboard — check browser permissions.');
    });
  });

  // Copy output to clipboard
  document.getElementById('cvt-copy-btn').addEventListener('click', function () {
    var btn = this;
    if (!outputEl.value) return;
    var label = btn.textContent;
    function done() {
      btn.textContent = 'Copied!';
      setTimeout(function () { btn.textContent = label; }, 2000);
    }
    if (navigator.clipboard) {
      navigator.clipboard.writeText(outputEl.value).then(done).catch(function () {
        outputEl.select(); document.execCommand('copy'); done();
      });
    } else {
      outputEl.select(); document.execCommand('copy'); done();
    }
  });

  // File upload via input
  fileEl.addEventListener('change', function () {
    var file = this.files[0];
    if (!file) return;
    readFile(file);
    this.value = '';
  });

  // Drag and drop onto input textarea
  inputEl.addEventListener('dragover', function (e) {
    e.preventDefault();
    this.classList.add('drag-over');
  });
  inputEl.addEventListener('dragleave', function () {
    this.classList.remove('drag-over');
  });
  inputEl.addEventListener('drop', function (e) {
    e.preventDefault();
    this.classList.remove('drag-over');
    var file = e.dataTransfer.files[0];
    if (file) readFile(file);
  });

  function readFile(file) {
    var reader = new FileReader();
    reader.onload = function (e) {
      inputEl.value = e.target.result;
      clearError();
    };
    reader.onerror = function () { showError('Failed to read file.'); };
    reader.readAsText(file);
  }

  // Initialise UI labels
  applyDirection();
})();
</script>
